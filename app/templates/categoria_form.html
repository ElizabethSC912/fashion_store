{% extends 'base.html' %}

{% block content %}

<h2>Categoría</h2>

<form method="POST">

<label>Nombre</label>

<input
type="text"
name="nombre"
class="form-control"
value="{{ categoria.nombre if categoria else '' }}">

<br>

<label>Descripción</label>

<textarea
name="descripcion"
class="form-control">

{{ categoria.descripcion if categoria else '' }}

</textarea>

<br>

<button class="btn btn-primary">

Guardar

</button>

</form>

{% endblock %}
