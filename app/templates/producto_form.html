{% extends 'base.html' %}

{% block content %}

<h2>Producto</h2>

<form method="POST" enctype="multipart/form-data">

<label>Nombre</label>

<input
type="text"
name="nombre"
class="form-control"
value="{{ producto.nombre if producto else '' }}">

<br>

<label>Descripción</label>

<textarea
name="descripcion"
class="form-control">{{ producto.descripcion if producto else '' }}</textarea>

<br>

<label>Precio</label>

<input
type="number"
step="0.01"
name="precio"
class="form-control"
value="{{ producto.precio if producto else '' }}">

<br>

<label>Stock</label>

<input
type="number"
name="stock"
class="form-control"
value="{{ producto.stock if producto else '' }}">

<br>

<label>Categoría</label>

<select
name="categoria_id"
class="form-control">

{% for categoria in categorias %}

<option
value="{{ categoria.id }}"
{% if producto and producto.categoria_id == categoria.id %}
selected
{% endif %}
>

{{ categoria.nombre }}

</option>

{% endfor %}

</select>

<br>

<label>Imagen</label>

<input
type="file"
name="imagen"
class="form-control">

<br>

<button class="btn btn-primary">
Guardar
</button>

</form>

{% endblock %}
