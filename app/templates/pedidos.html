{% extends 'base.html' %}

{% block content %}

<h2>Mis Pedidos</h2>

<table class="table table-bordered">

<tr>

<th>ID</th>
<th>Total</th>
<th>Estado</th>
<th>Fecha</th>
<th>Detalle</th>

</tr>

{% for pedido in pedidos %}

<tr>

<td>{{ pedido.id }}</td>
<td>{{ pedido.total }}</td>
<td>{{ pedido.estado }}</td>
<td>{{ pedido.fecha }}</td>
<td>

<a
href="/pedidoss/{{ pedido.id }}"
class="btn btn-info">

Ver

</a>
<a
href="/cancelar-pedido/{{ pedido.id }}"
class="btn btn-danger">

Cancelar
</a>
</td>
</tr>

{% endfor %}

</table>

{% endblock %}
