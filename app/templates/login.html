{% extends 'base.html' %}

{% block content %}

<div class="auth-container">

<div class="auth-card">

<h2 class="auth-title">
Iniciar Sesión
</h2>

<form method="POST">

<div class="mb-3">

<label>Correo</label>

<input
type="email"
name="correo"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Contraseña</label>

<input
type="password"
name="password"
class="form-control"
required>

</div>

<button class="auth-btn">
Ingresar
</button>

</form>

</div>

</div>

{% endblock %}
